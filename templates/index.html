<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Disease Prediction System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.main-card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0px 10px 30px rgba(0,0,0,0.2);
width:600px;
}

.title{
text-align:center;
font-weight:bold;
margin-bottom:25px;
color:#2c3e50;
}

.subtitle{
text-align:center;
font-size:14px;
color:gray;
margin-bottom:25px;
}

textarea{
height:120px;
resize:none;
}

.predict-btn{
font-size:18px;
padding:10px;
}

.footer-text{
text-align:center;
margin-top:20px;
font-size:13px;
color:gray;
}

</style>

</head>

<body>

<div class="main-card">

<h2 class="title">AI Disease Prediction System</h2>

<p class="subtitle">
Enter your symptoms below and the AI model will predict the possible disease.
</p>

<form action="/predict" method="post">

<div class="mb-3">

<label class="form-label"><b>Enter Symptoms</b></label>

<textarea 
class="form-control"
name="symptoms"
placeholder="Example: fever cough headache fatigue"
required></textarea>

<small class="text-muted">
Enter symptoms separated by spaces.
</small>

</div>

<button type="submit" class="btn btn-primary w-100 predict-btn">
Predict Disease
</button>

</form>

<p class="footer-text">
AI Powered Healthcare Prediction System
</p>

</div>

</body>

</html>
